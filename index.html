<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Factoria Alianza – Taller Automotriz</title>
  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React y ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel para JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-white text-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- Servicios ---
    const services = [
      { id:1,  title:"Reparaciones Mecánicas",             description:"Desde mantenimiento rutinario hasta reparaciones complejas.",              icon:"🔧" },
      { id:2,  title:"Sistemas Electrónicos",              description:"",                 icon:"⚡" },
      { id:3,  title:"Servicios de Frenos",                description:"Inspecciones, reparaciones y reemplazos de frenos con calidad.",              icon:"🛑" },
      { id:4,  title:"Rectificación de Discos",            description:"Restauración y pulido profesional de tus discos de freno.",                   icon:"⚙️" },
      { id:5,  title:"Diagnóstico de Motor",               description:"Equipo de diagnóstico de última generación para tu motor.",                    icon:"🛠️" },
      { id:6,  title:"Suspensión y Dirección",             description:"Inspección y ajuste para un manejo suave y seguro.",                            icon:"🛞" },
      { id:7,  title:"Cambio de Aceite",                   description:"Cambio profesional de aceite y filtro con las mejores marcas.",                 icon:"🛢️" },
      { id:8,  title:"Alineación y Balanceo",              description:"Alineación perfecta y balanceo equilibrado para tus ruedas.",                   icon:"🔄" },
      { id:9,  title:"Lavado de Inyectores",               description:"Limpieza profunda de inyectores para un rendimiento óptimo.",                   icon:"💧" },
      { id:10, title:"Rectificación de Piezas Cilíndricas", description:"Pulido y ajuste de cilindros con precisión profesional.",                       icon:"⚙️" },
      { id:11, title:"Prensado Hidráulico",                description:"Formado y prensado de piezas metálicas con alta presión.",                      icon:"🔩" },
      { id:12, title:"Soldadura",                          description:"Uniones de metal resistentes con soldadura profesional.",                       icon:"🔥" },
      { id:13, title:"Grúa Vehicular",                     description:"Servicio de remolque y auxilio vial las 24 h.",                                  icon:"🚚" },
    ];

    // --- Repuestos (solo imagen, sin texto) ---
    const parts = [
      { id:1,  image:"images/Cables de bujía en oferta.png",   category:"engine"     },
      { id:2,  image:"images/Llantas en Venta con Rines.png", category:"suspension" },
      { id:3,  image:"images/Manguera.png",                   category:"engine"     },
      { id:4,  image:"images/bobina.png",                     category:"engine"     },
      { id:5,  image:"images/faja.png",                       category:"engine"     },
      { id:6,  image:"images/soporte.png",                    category:"engine"     },
    ];

    // --- Galería de Fotos ---
    const gallery = [
      { id:1, src:"images/ALINEAMIENTO.jpeg",            caption:"Alineamiento"          },
      { id:2, src:"images/MOTORES.jpeg",                 caption:"Motores"               },
      { id:3, src:"images/electronico.jpeg",             caption:"Electrónico"            },
      { id:4, src:"images/torno.jpeg",                   caption:"Torno"                 },
      { id:5, src:"images/prensa.jpeg",                  caption:"Prensa"                },
      { id:6, src:"images/soldadura.jpeg",               caption:"Soldadura"             },
      { id:7, src:"images/grua.jpeg",                    caption:"Grúa Vehicular"        },
      { id:8, src:"images/lavado vehicular.jpeg",        caption:"Lavado Vehicular"      },
      { id:9, src:"images/limpieza de inyectores.png",   caption:"Limpieza de Inyectores"},
    ];

    function App() {
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [activeTab, setActiveTab]           = useState('all');

      const filteredParts = activeTab === 'all'
        ? parts
        : parts.filter(p => p.category === activeTab);

      return (
        <div className="min-h-screen">

          {/* HEADER */}
          <header className="bg-gray-900 text-white shadow-md">
            <div className="container mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center">
                <svg className="w-10 h-10 text-red-600" viewBox="0 0 24 24" fill="none">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10
                           10 10-4.48 10-10S17.52 2 12 2z"/>
                </svg>
                <span className="ml-2 text-xl font-bold">Factoria Alianza</span>
              </div>
              <nav className="hidden md:flex space-x-8">
                <a href="#home"     className="hover:text-red-500">Inicio</a>
                <a href="#services" className="hover:text-red-500">Servicios</a>
                <a href="#parts"    className="hover:text-red-500">Repuestos</a>
                <a href="#gallery"  className="hover:text-red-500">Galería</a>
                <a href="#contact"  className="hover:text-red-500">Contacto</a>
              </nav>
              <div className="hidden md:flex items-center space-x-4">
                <div className="flex items-center">
                  <svg className="w-5 h-5 text-red-500 mr-1" viewBox="0 0 24 24" fill="none">
                    <path d="M20 6.83V17.17C20 20.41 18.41 22
                             15.17 22H8.83C5.59 22 4 20.41 4
                             17.17V6.83C4 3.59 5.59 2 8.83
                             2H15.17C18.41 2 20 3.59 20 6.83z"/>
                  </svg>
                  <span>957388710 / 956511521</span>
                </div>
                <div className="flex items-center">
                  <svg className="w-5 h-5 text-red-500 mr-1" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0
                             5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                  </svg>
                  <span>Av. Oscar R. Benavides 1176, Chincha Alta</span>
                </div>
              </div>
              <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="md:hidden">
                {mobileMenuOpen
                  ? <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                            d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                  : <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                            d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                }
              </button>
            </div>
            {mobileMenuOpen && (
              <div className="md:hidden bg-gray-800 p-4 space-y-2">
                <a href="#home"     className="block text-white">Inicio</a>
                <a href="#services" className="block text-white">Servicios</a>
                <a href="#parts"    className="block text-white">Repuestos</a>
                <a href="#gallery"  className="block text-white">Galería</a>
                <a href="#contact"  className="block text-white">Contacto</a>
              </div>
            )}
          </header>

          {/* HERO */}
          <section id="home" className="relative bg-gray-900 text-white py-20">
            <div className="absolute inset-0 opacity-70 bg-gradient-to-r from-black via-transparent to-black"></div>
            <img
              src="images/JPG.webp"
              alt="Taller Automotriz"
              className="w-full h-full object-cover absolute inset-0"
            />
            <div className="relative container mx-auto px-4 max-w-3xl text-center">
              <h1 className="text-5xl font-bold mb-4">Taller Automotriz Profesional</h1>
              <p className="text-xl mb-6">Mecánicos expertos, repuestos de calidad y servicio excepcional.</p>
              <div className="space-x-4">
                <a href="#contact" className="bg-red-600 px-6 py-3 rounded-full">Agendar Servicio</a>
                <a href="#parts"   className="bg-white text-gray-900 px-6 py-3 rounded-full">Ver Repuestos</a>
              </div>
            </div>
          </section>

          {/* SERVICES */}
          <section id="services" className="py-20 bg-gray-50">
            <div className="container mx-auto px-4 text-center mb-12">
              <h2 className="text-4xl font-bold mb-4">Nuestros Servicios</h2>
              <p className="text-gray-600 max-w-xl mx-auto">Ofrecemos un amplio rango de servicios para mantener tu vehículo en óptimas condiciones.</p>
            </div>
            <div className="container mx-auto px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
              {services.map(s => (
                <div key={s.id} className="bg-white p-6 rounded-lg shadow hover:-translate-y-1 transition">
                  <div className="text-4xl mb-3 text-red-600">{s.icon}</div>
                  <h3 className="text-xl font-semibold mb-2">{s.title}</h3>
                  <p className="text-gray-600">{s.description}</p>
                </div>
              ))}
            </div>
          </section>

          {/* PARTS */}
          <section id="parts" className="py-20">
            <div className="container mx-auto px-4 text-center mb-12">
              <h2 className="text-4xl font-bold mb-4">Repuestos de Calidad</h2>
              <div className="inline-flex space-x-2">
                {['all','engine','brakes','electronic','suspension'].map(cat => (
                  <button
                    key={cat}
                    onClick={() => setActiveTab(cat)}
                    className={`px-4 py-2 rounded-full ${
                      activeTab===cat
                        ? 'bg-red-600 text-white'
                        : 'bg-gray-200 text-gray-800'
                    }`}
                  >
                    {cat==='all'?'Todos'
                      :cat==='engine'?'Motor'
                      :cat==='brakes'?'Frenos'
                      :cat==='electronic'?'Mecatrónica'
                      :'Suspensión'}
                  </button>
                ))}
              </div>
            </div>
            <div className="container mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
              {filteredParts.map(p => (
                <div key={p.id} className="bg-gray-50 rounded shadow hover:shadow-lg">
                  <img
                    src={p.image}
                    alt=""
                    className="w-full h-auto object-contain transition-transform hover:scale-105"
                  />
                </div>
              ))}
            </div>
          </section>

          {/* GALLERY */}
          <section id="gallery" className="py-20 bg-gray-50">
            <div className="container mx-auto px-4 text-center mb-12">
              <h2 className="text-4xl font-bold mb-4">Galería de Fotos</h2>
            </div>
            <div className="container mx-auto px-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">
              {gallery.map(photo => (
                <div key={photo.id} className="overflow-hidden rounded shadow-lg">
                  <img
                    src={photo.src}
                    alt={photo.caption}
                    className="w-full h-48 object-cover"
                  />
                  <p className="mt-2 text-center font-medium">{photo.caption}</p>
                </div>
              ))}
            </div>
          </section>

          {/* CONTACT */}
          <section id="contact" className="py-20 bg-gray-50">
            <div className="container mx-auto px-4 lg:flex lg:space-x-12">
              <div className="lg:w-1/2">
                <h2 className="text-4xl font-bold mb-4">Contáctanos</h2>
                <form
                  action="mailto:sgalianzaperu@gmail.com"
                  method="POST"
                  encType="text/plain"
                  className="space-y-4"
                >
                  <input className="w-full px-4 py-2 border rounded" placeholder="Nombre" name="Nombre" />
                  <input className="w-full px-4 py-2 border rounded" placeholder="Correo" name="Correo" type="email"/>
                  <input className="w-full px-4 py-2 border rounded" placeholder="Asunto" name="Asunto" />
                  <textarea className="w-full px-4 py-2 border rounded" rows="5" placeholder="Mensaje" name="Mensaje"></textarea>
                  <button type="submit" className="bg-red-600 text-white px-6 py-3 rounded">Enviar Mensaje</button>
                </form>
              </div>
              <div className="lg:w-1/2 mt-8 lg:mt-0">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.123456789!2d-76.1469645!3d-13.4143813!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x911017af87332f69%3A0xf1bfef8a48abca54!2sFactoria%20Alianza!5e0!3m2!1ses-419!2spe!4v169XXXXXXX"
                  className="w-full h-64 rounded shadow"
                  style={{ border: 0 }}
                  allowFullScreen=""
                  loading="lazy"
                  referrerPolicy="no-referrer-when-downgrade"
                />
                <div className="mt-4">
                  <p><strong>Dirección:</strong> Av. Oscar R. Benavides 1176, Chincha Alta</p>
                  <p><strong>Horario:</strong> Lun–Vie 8:00–17:30 pm, Sáb 8:00–17:30 pm </p>
                </div>
              </div>
            </div>
          </section>

          {/* FOOTER */}
          <footer className="bg-gray-900 text-gray-400 py-8">
            <div className="container mx-auto px-4 text-center">
              <p>&copy; {new Date().getFullYear()} Factoria Alianza – Todos los derechos reservados.</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
```
